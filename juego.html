<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego Matemático</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background-image: url("https://http2.mlstatic.com/D_639519-CBT73264435354_122023-C.jpg");
    background-size: cover;
    background-position: center;
    transition: background 0.3s;
}

/* TITULO */
h1 {
    font-size: 40px;
}

/* BOTONES */
button {
    padding: 10px 18px;
    margin: 8px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

/* PANEL */
#panel {
    font-size: 18px;
    margin: 10px;
}

/* EJERCICIO */
#ejercicio {
    font-size: 30px;
    margin-top: 20px;
}

input {
    font-size: 20px;
    width: 80px;
    text-align: center;
}

/* EFECTOS */
@keyframes rojoFlash {
    0% { background: red; }
    50% { background: darkred; }
    100% { background: red; }
}
.bien {
    background: lightgreen !important;
}

/* MENSAJE GRANDE CENTRO */
#mensaje {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 120px;
    font-weight: bold;
    pointer-events: none;
}

/* PERSONAJE */
#personaje {
    font-size: 50px;
}

/* VOLVER */
.volver {
    margin-top: 20px;
    display: inline-block;
    text-decoration: none;
    background: blue;
    color: white;
    padding: 10px 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1 id="titulo"></h1>

<div id="panel">
Puntos: <span id="puntos">0</span> |
Tiempo: <span id="tiempo">30</span>s |
⭐ Estrellas: <span id="estrellas">0</span>
</div>

<div id="personaje">🙂</div>
<div id="mensaje"></div>

<div id="ejercicio"></div>

<a href="index.html" class="volver">⬅ Volver</a>

<audio id="ok" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="fail" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>
let respuesta = 0;
let puntos = 0;
let tiempo = 30;
let intervalo;
let modo = "";
let max = 20;

/* MODO */
const params = new URLSearchParams(window.location.search);
modo = params.get("modo");

document.getElementById("titulo").textContent =
    modo === "suma" ? "➕ Juego de SUMA" : "➖ Juego de RESTA";

/* INICIAR */
intervalo = setInterval(contarTiempo, 1000);
generar();

/* TIEMPO */
function contarTiempo() {
    tiempo--;
    document.getElementById("tiempo").textContent = tiempo;

    if (tiempo <= 0) {
        clearInterval(intervalo);
        let estrellas = Math.floor(puntos / 3);
        document.getElementById("estrellas").textContent = estrellas;

        document.getElementById("ejercicio").innerHTML =
            "⏰ Fin del juego<br>Puntaje: " + puntos;
    }
}

/* GENERAR */
function generar() {
    document.getElementById("mensaje").textContent = "";

    let a = Math.floor(Math.random() * max);
    let b = Math.floor(Math.random() * max);

    if (modo === "suma") {
        respuesta = a + b;
        document.getElementById("ejercicio").innerHTML =
            `${a} + ${b} = <input id="r">
            <button onclick="verificar()">OK</button>`;
    } else {
        if (b > a) [a, b] = [b, a];
        respuesta = a - b;
        document.getElementById("ejercicio").innerHTML =
            `${a} - ${b} = <input id="r">
            <button onclick="verificar()">OK</button>`;
    }
}

/* VERIFICAR */
function verificar() {
    let r = parseInt(document.getElementById("r").value);

    if (r === respuesta) {
        puntos++;
        tiempo += 3;

        document.getElementById("puntos").textContent = puntos;
        document.getElementById("tiempo").textContent = tiempo;

        document.getElementById("personaje").textContent = "😄";

        // ✔ GRANDE
        document.getElementById("mensaje").textContent = "✔";

        document.getElementById("ok").play();

        setTimeout(() => {
            document.getElementById("mensaje").textContent = "";
            generar();
        }, 700);

    } else {
        document.getElementById("personaje").textContent = "😢";

        // ❌ GRANDE
        document.getElementById("mensaje").textContent = "❌";

        document.getElementById("fail").play();

        setTimeout(() => {
            document.getElementById("mensaje").textContent = "";
        }, 700);
    }
}
</script>

</body>
</html>
